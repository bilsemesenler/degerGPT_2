<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dinim İslâm – Ahlâk</title>
<style>
  :root {
    --teal-50:#E1F5EE;--teal-100:#9FE1CB;--teal-200:#5DCAA5;
    --teal-600:#0F6E56;--teal-800:#085041;--teal-900:#04342C;
    --green-50:#EAF3DE;--green-600:#3B6D11;
    --coral-50:#FAECE7;--coral-600:#993C1D;
    --purple-50:#EEEDFE;--purple-800:#3C3489;
    --amber-50:#FAEEDA;
    --gray-100:#D3D1C7;--gray-400:#888780;--gray-800:#444441;
    --bg:#FAFAF7;--card:#FFFFFF;--text:#2C2C2A;--muted:#888780;
    --border:rgba(44,44,42,0.11);
    --r:14px;--rs:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1a1a18;--card:#252523;--text:#e8e6e0;--border:rgba(232,230,224,0.09);}
    .msg.bot .msg-bubble{background:var(--card);}
    .arabic-quote{background:rgba(59,109,17,.15);color:#9FE1CB;}
    .mark-done-btn{color:#9FE1CB;border-color:#0F6E56;}
    .mark-done-btn.done{background:#0F6E56;border-color:#0F6E56;color:#E1F5EE;}
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}

  .screen{display:none;min-height:100vh;flex-direction:column;}
  .screen.active{display:flex;}

  /* HOME */
  .home-header{
    background:linear-gradient(150deg,#0F6E56 0%,#3B6D11 100%);
    padding:2.5rem 1.5rem 1.75rem;color:white;
  }
  .home-header .logo{font-size:11px;letter-spacing:.1em;opacity:.75;margin-bottom:.4rem;text-transform:uppercase;}
  .home-header h1{font-size:27px;font-weight:700;line-height:1.2;}
  .home-header p{font-size:13px;opacity:.8;margin-top:.35rem;}
  .progress-bar-wrap{margin-top:1.25rem;}
  .progress-bar-wrap .plabel{display:flex;justify-content:space-between;font-size:12px;opacity:.8;margin-bottom:5px;}
  .progress-track{height:5px;background:rgba(255,255,255,.22);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:white;border-radius:99px;transition:width .5s ease;}

  .section-label{font-size:11px;font-weight:700;letter-spacing:.09em;color:var(--muted);
    padding:.9rem 1.25rem .3rem;text-transform:uppercase;}

  .topic-list{padding:0 .9rem .4rem;display:flex;flex-direction:column;gap:5px;}
  .topic-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--r);
    padding:.85rem .9rem;display:flex;align-items:center;gap:11px;
    cursor:pointer;transition:transform .1s;
  }
  .topic-card:active{transform:scale(.98);}
  .topic-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:19px;}
  .topic-card.good .topic-icon{background:var(--teal-50);}
  .topic-card.bad  .topic-icon{background:var(--coral-50);}
  .topic-info{flex:1;min-width:0;}
  .topic-name{font-size:15px;font-weight:500;}
  .topic-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .topic-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .2s;}
  .topic-check.done{background:var(--teal-200);border-color:var(--teal-200);color:var(--teal-800);}

  /* CHAT */
  .chat-nav{
    position:sticky;top:0;z-index:10;
    background:var(--card);border-bottom:1px solid var(--border);
    padding:.8rem .9rem;display:flex;align-items:center;gap:.7rem;
  }
  .back-btn{width:36px;height:36px;border-radius:var(--rs);background:var(--bg);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:17px;flex-shrink:0;color:var(--text);}
  .chat-nav-info{flex:1;min-width:0;}
  .chat-nav-info h2{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-nav-info p{font-size:11px;color:var(--muted);}
  .mark-done-btn{padding:6px 11px;border-radius:99px;border:1.5px solid var(--teal-200);
    background:transparent;color:var(--teal-600);font-size:12px;font-weight:600;
    cursor:pointer;white-space:nowrap;transition:all .15s;}
  .mark-done-btn.done{background:var(--teal-200);border-color:var(--teal-200);color:var(--teal-800);}

  .chat-messages{flex:1;overflow-y:auto;padding:.9rem;display:flex;flex-direction:column;gap:.7rem;}
  .msg{display:flex;gap:8px;max-width:100%;}
  .msg.user{flex-direction:row-reverse;}
  .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
  .msg.bot  .msg-avatar{background:var(--teal-50);color:var(--teal-800);}
  .msg.user .msg-avatar{background:var(--purple-50);color:var(--purple-800);}
  .msg-bubble{padding:.65rem .85rem;border-radius:16px;font-size:14px;line-height:1.65;
    max-width:calc(100% - 44px);}
  .msg.bot  .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .msg.user .msg-bubble{background:#0F6E56;color:white;border-bottom-right-radius:4px;}
  .msg-bubble p{margin-bottom:.45rem;}
  .msg-bubble p:last-child{margin-bottom:0;}
  .msg-bubble strong{font-weight:600;}

  .typing{display:flex;gap:4px;align-items:center;padding:.35rem .1rem;}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);
    animation:bounce .9s ease infinite;}
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  .quick-replies{display:flex;flex-wrap:wrap;gap:5px;padding:.5rem .9rem 0;}
  .qr-btn{padding:7px 12px;border-radius:99px;border:1px solid var(--border);
    background:var(--card);font-size:12px;color:var(--text);cursor:pointer;transition:all .1s;}
  .qr-btn:active{transform:scale(.97);}

  .chat-input-area{padding:.7rem .9rem;background:var(--card);border-top:1px solid var(--border);
    display:flex;gap:7px;align-items:flex-end;}
  .chat-textarea{flex:1;border:1px solid var(--border);border-radius:18px;
    padding:.6rem .85rem;font-size:14px;font-family:inherit;resize:none;
    background:var(--bg);color:var(--text);max-height:120px;line-height:1.5;outline:none;}
  .chat-textarea:focus{border-color:var(--teal-200);}
  .send-btn{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:#0F6E56;
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:white;font-size:17px;transition:opacity .15s;}
  .send-btn:disabled{opacity:.35;}

  #loading-screen{position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:1rem;z-index:100;}
  .ldots{display:flex;gap:8px;}
  .ldots span{width:8px;height:8px;border-radius:50%;background:#0F6E56;
    animation:bounce .9s ease infinite;}
  .ldots span:nth-child(2){animation-delay:.15s;}
  .ldots span:nth-child(3){animation-delay:.3s;}

  .spacer{height:1.5rem;}
</style>
</head>
<body>

<div id="loading-screen">
  <div style="font-size:34px">📖</div>
  <p style="font-size:14px;color:var(--muted)">Yükleniyor…</p>
  <div class="ldots"><span></span><span></span><span></span></div>
</div>

<!-- ── HOME ── -->
<div class="screen" id="home-screen">
  <div class="home-header">
    <div class="logo">Dinim İslâm · Ünite 4 · s. 151–189</div>
    <h1>İslâm Ahlâkı</h1>
    <p>Model İnsan Kavramları · Sohbet ile Öğren</p>
    <div class="progress-bar-wrap">
      <div class="plabel">
        <span>Genel ilerleme</span>
        <span id="pct-label">0 / 26 konu</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="main-progress" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="section-label">✦ İyi Ahlâk — Övülen Davranışlar</div>
  <div class="topic-list" id="good-list"></div>

  <div class="section-label">✦ Kötü Ahlâk — Yerilen Davranışlar</div>
  <div class="topic-list" id="bad-list"></div>
  <div class="spacer"></div>
</div>

<!-- ── CHAT ── -->
<div class="screen" id="chat-screen">
  <nav class="chat-nav">
    <button class="back-btn" onclick="goHome()" aria-label="Geri">←</button>
    <div class="chat-nav-info">
      <h2 id="chat-title">Konu</h2>
      <p id="chat-sub">Sohbet ile öğren</p>
    </div>
    <button class="mark-done-btn" id="done-btn" onclick="toggleDone()">✓ Tamamla</button>
  </nav>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="chat-input-area">
    <textarea class="chat-textarea" id="user-input" rows="1"
      placeholder="Bir soru sor…"
      oninput="autoResize(this)"
      onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// TOPICS
// ═══════════════════════════════════════════
const TOPICS = {
  good: [
    { id:'dogruluk',       name:'Doğruluk',                icon:'⚖️',  sub:'Söz, öz ve eylem uyumu',
      desc:'Doğruluk, insanın dudağı ile kalbi arasında bir uyumsuzluk bulunmaması; özün, sözün ve amelin ahenk içinde olmasıdır. Doğruluktan ayrılmayan insan aynı zamanda âdil, dürüst, sözünde duran ve güvenilir kişidir. Doğruluğun insana hem maddî hem mânevî getirileri vardır: iç huzuru, insanlar arasında saygınlık ve cennete kavuşmak bunların başında gelir.'},
    { id:'infak',          name:'İnfak',                   icon:'🤲',  sub:'Allah rızası için harcama ve bağış',
      desc:'İnfak, Allah\'ın hoşnutluğunu kazanmak amacıyla kişinin başkaları için gönülden yaptığı harcama ve bağıştır. İyi ahlâka sahip mümin, bollukta ve darlıkta, gizli ve açık başkaları için harcamada bulunur. İnfak insanlar arasında dayanışmayı sağlar, zengin ve fakir arasında sevgi bağları kurar.'},
    { id:'iffet',          name:'İffet',                   icon:'🌿',  sub:'Ruhun temizliği ve nefsi koruma',
      desc:'İffetli olmak ruhun temizliği ve günahtan uzak duruşun ifadesidir. Kişinin arzu ve isteklerini dizginlemesi, ölçülü olabilmesiyle kendini gösterir. İffetli ve namuslu bir kişi kendine ait olmayan şeylere göz dikmez; meşrû ve helâl olanla yetinir. İffetli olmanın en önemli şartı hayâ sahibi olmaktır.'},
    { id:'emanet',         name:'Emanete Riayet',          icon:'🔑',  sub:'Güvenilirlik ve sorumluluk',
      desc:'Emanet, geri almak üzere bırakılandır; emin insan onu sahibinin beklentisine uygun korur. Emin insanların bulunduğu toplumlarda herkes sorumluluklarını tam yerine getirir; korku silinmiş, huzur ve güven ortamı sağlanmıştır.'},
    { id:'adalet',         name:'Âdil Olmak',              icon:'🏛️',  sub:'Herkese hakkını vermek',
      desc:'Adalet, herkesin ve her şeyin yerli yerinde bulunması anlamına gelir. Âdil insan kendi ya da yakınlarının aleyhine de olsa şahitliğini dosdoğru yapar, gerçeği asla çarpıtmaz, öfke veya düşmanlıkla hareket etmez.'},
    { id:'kardeslik',      name:'Kardeşlik',               icon:'🤝',  sub:'İnanç ve gönül yakınlığı',
      desc:'Müslümanların birlikteliğinin dayanağı olan kardeşlik, inanç ve gönül yakınlığıyla sıkı sıkıya kurulmuş bağdır. Kardeşlik duygusuyla dolu insan diğerkâm, vefalı, merhametli ve özverilidir; kardeşliğin hâkim olduğu toplumda çıkar çatışmaları azalır.'},
    { id:'hosgoru',        name:'Hoşgörü ve Bağışlama',    icon:'🕊️',  sub:'Affetmek ve anlayış göstermek',
      desc:'Hoş görmek, birinin hatalı davranışına karşı iyi davranış geliştirmek; aynen karşılık verebilecekken vazgeçmektir. Bağışlayan insan hem kendini hem karşısındakini kurtarır. Yüce Allah affetmeyi, hoş görmeyi ve bağışlamayı övmektedir.'},
    { id:'sabir',          name:'Sabır',                   icon:'🌱',  sub:'Güçlüklere göğüs germek',
      desc:'Sabır; güçlükler, zorluklar ve sıkıntılara göğüs germenin adıdır. Sabreden insan haklılığını sakin bir şekilde savunur. Kur\'an-ı Kerîm\'de Allah\'ın sabredenlerle birlikte olduğu bildirilmekte; sabır en büyük erdemlerden biri sayılmaktadır.'},
    { id:'alcakgon',       name:'Alçakgönüllülük',         icon:'🌾',  sub:'Tevazu ve haddi bilmek',
      desc:'Alçakgönüllülük, kişinin kendini diğer insanlardan üstün görmemesi; haddini bilmesidir. Alçakgönüllü insanlardan oluşan bir toplumda kimse kimsenin sınırına tecavüz etmez. Kibir ve benlik duygusunun zıttı olan alçakgönüllülük saygı ve sevginin temelidir.'},
    { id:'sozunde',        name:'Sözünde Durmak',          icon:'📜',  sub:'Ahde vefa ve güvenilirlik',
      desc:'Sözünü tutmak, kişinin vaat ettiği şeyi yerine getirmesi; üstlendiği görevi ifa etmesidir. Sözünde duran insan başkalarının güvenini kazanır; toplumda işbirliği ve düzen sağlanır. Yüce Allah verilen sözün yerine getirilmesini emreder.'},
    { id:'gorgulu',        name:'Görgülü Olmak',           icon:'🌸',  sub:'Nezaket ve saygı kuralları',
      desc:'Toplumsal hayat içinde bireylerin görüp yaşayarak kazandıkları nezaket kuralları vardır. Görgülü olmak bu davranışları sergileme; selamlama, misafirperverlik, yemek âdâbı ve konuşma tarzında örnek olmaktır.'},
    { id:'iyidavranmak',   name:'İyi Davranmak ve Güzel Söz', icon:'💬', sub:'Her ortamda hayır söylemek',
      desc:'İyi kavramını Allah\'ın istekleriyle uyumlu her türlü söz ve davranış için kullanırız. Güzel sözün hem konuşana hem dinleyene maddî ve mânevî faydaları büyüktür; kalpleri birbirine yaklaştırır.'},
    { id:'yardim',         name:'Yardımlaşmak',            icon:'🌊',  sub:'Maddî ve mânevî destek',
      desc:'Yardımlaşma, maddî olduğu kadar mânevî her türlü desteği de kapsar. Allah\'ın hoşnutluğu için yardımlaşan müslümanlar yaptıkları yardımı başa kakmaz, karşılık beklemez. Yardımlaşma toplumsal dayanışmanın temelidir.'}
  ],
  bad: [
    { id:'cimrilik',   name:'Cimrilik',             icon:'🪙',  sub:'Malı gerektiği gibi harcamamak',
      desc:'Cimrilik, malı mülkü gerektiği kadar ve zamanında harcamaya kıyamayıp elde tutmaktır. Cimri insandan başa kakma, katılık ve tepeden bakma beklenebilir. İslâm malın faydalı yerlerde harcanmasını emreder.'},
    { id:'iftira',     name:'İftira',               icon:'🗡️',  sub:'Asılsız suç yüklemek',
      desc:'İftira, birine kasıtlı olarak asılsız yere bir suç yüklemek; kara çalmaktır. İftira eden kişi hem dünyada hem âhirette büyük vebâl altına girer. Kur\'an-ı Kerîm iftira atanları açıkça kınamaktadır.'},
    { id:'basaka',     name:'İyiliği Başa Kakmak',  icon:'👋',  sub:'Yapılan iyiliği hatırlatmak',
      desc:'Yapılan iyiliği başa kakmak, verilen yardımı karşı tarafa eziyet verecek biçimde hatırlatmak ve üstünlük taslamaktır. Bu davranış verilen her iyiliğin sevabını yok eder ve insanlar arasındaki sevgi bağını koparır.'},
    { id:'giybet',     name:'Gıybet',               icon:'👂',  sub:'Arkadan çekiştirmek',
      desc:'Gıybet, bir kimsenin bulunmadığı ortamda söylenmesinden hoşlanmayacağı özelliklerini saymak; çekiştirmektir. Kur\'an-ı Kerîm gıybeti ölü kardeşin etini yemeye benzetmiştir; insanlar arasında saygı ve güveni yok eder.'},
    { id:'kibir',      name:'Kibir',                icon:'👑',  sub:'Kendini beğenip büyüklenmek',
      desc:'Kibir, kendini beğenip başkalarından üstün tutmak, büyüklük taslamaktır. Kibirli insan çevresindekini hor görür; bu tutum kin ve nefret doğurur. Gerçek büyüklük yalnızca Allah\'a aittir; kibir en tehlikeli ahlâkî hastalıklardan biridir.'},
    { id:'ifsat',      name:'Bozgunculuk',          icon:'🌪️',  sub:'Toplumsal düzeni bozmak',
      desc:'Bozgunculuk, ilâhî iradeye uygun düzeni bozmak ve toplumda fitne çıkarmaktır. Bozguncu insan, insanlar arasına nifak sokar; barışı, güveni ve düzeni bozar. İslâm fesat çıkarmayı en ağır günahlardan biri sayar.'},
    { id:'haset',      name:'Haset',                icon:'🎭',  sub:'Kıskançlık ve çekememezlik',
      desc:'Haset, başkasında olan nimetten huzursuz olup çekememektir. Haset eden hem kendine hem topluma zarar verir. Peygamberimiz (s.a.s.) hasedi iyilikleri yok eden ateşe benzetmiştir.'},
    { id:'savurganlık',name:'Savurganlık (İsraf)',  icon:'💨',  sub:'Malı gereksiz harcamak',
      desc:'Savurganlık, malı mülkü yerli yerinde ve doğru sebeplerle harcamamak; saçıp savurmaktır. İslâm malın hem cimrice tutulmasını hem de saçılmasını yasaklar; orta yolu, ölçülü harcamayı emreder.'},
    { id:'yalan',      name:'Yalan',                icon:'🌀',  sub:'Aldatmak ve doğrudan sapmak',
      desc:'Yalan, kasıtlı olarak gerçeğe aykırı söz söylemektir. Peygamberimiz yalanın yoldan çıkardığını, yoldan çıkmanın cehenneme götürdüğünü bildirmiştir. Yalan güvensizlik ve ikiyüzlülük ortamı yaratır.'},
    { id:'hirsizlik',  name:'Hırsızlık',            icon:'🫗',  sub:'Başkasının malına el uzatmak',
      desc:'Hırsızlık, başkasının malını izinsiz almaktır. İslâm mülkiyet hakkını kutsal sayar ve bu hakka tecavüzü şiddetle yasaklar. Hırsızlık toplumsal güveni yok eder, bireyin onurunu zedeler.'},
    { id:'kücükdüşürme',name:'İnsanları Küçük Düşürmek',icon:'😔',sub:'Aşağılamak ve alay etmek',
      desc:'İnsanları küçük düşürmek, alay etmek ve aşağılamak ciddi bir ahlâk suçudur. Kur\'an-ı Kerîm bir topluluğun diğerini alaya almasını yasaklamış; bunun iman ile bağdaşmadığını bildirmiştir.'},
    { id:'riya',       name:'Riyâ / Gösteriş',      icon:'🎪',  sub:'İkiyüzlülük ve gösteriş',
      desc:'Riyâ, iyi amelleri Allah rızası değil başkalarının takdiri için yapmaktır. Riyâ amellerin değerini yok eder; niyeti bozar. Kur\'an-ı Kerîm gösteriş yapanları kınarak amellerin yalnızca Allah rızası için yapılmasını emreder.'},
    { id:'zina',       name:'Zina ve Fuhuş',        icon:'🚫',  sub:'Nikâhsız ilişki',
      desc:'Zina, aralarında meşrû nikâh bağı bulunmayanların ilişkisidir. İslâm zinayı kesinlikle yasaklamış ve bu yasağa "yaklaşmayın" diyerek vurgu yapmıştır. Zina aile kurumunu yıkar, toplumsal güveni sarsar.'},
    { id:'sarhoşluk',  name:'Sarhoşluk ve Kumar',   icon:'🎲',  sub:'Aklı gideren kötü alışkanlıklar',
      desc:'İçki aklı örter; kumarda şansa dayalı haksız kazanç söz konusudur. Kur\'an-ı Kerîm her ikisini de şeytanın işi olarak nitelendirmiştir. Bu alışkanlıklar aile ve toplum hayatında ağır tahribatlara yol açar.'},
    { id:'büyü',       name:'Büyücülük',            icon:'🔮',  sub:'Gizli zararlı pratikler',
      desc:'Büyü, tabiat kanunlarına aykırı sonuçlar elde etmek iddiasındaki gizli işlemlerdir. İslâm büyüyü yapmayı ve yaptırmayı kesinlikle yasaklamıştır; büyü insanı şirke sürükler, ruh sağlığını bozar.'},
    { id:'rüşvet',     name:'Rüşvet',               icon:'💸',  sub:'Haksız kolaylık için para',
      desc:'Rüşvet, yaptırılmak istenen işte yasa dışı kolaylık sağlanması için verilen paradır. Alan da veren de bu günahın ortağıdır. Rüşvet adaleti çiğner, kamu güvenini yok eder.'}
  ]
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let progress = JSON.parse(localStorage.getItem('dinim_prog') || '{}');
let currentTopic = null;
let chatHistory = [];
let isLoading = false;

const TOTAL = TOPICS.good.length + TOPICS.bad.length;

// ═══════════════════════════════════════════
// SYSTEM PROMPT
// ═══════════════════════════════════════════
function buildSystem(topic) {
  const isGood = TOPICS.good.find(t => t.id === topic.id);
  return `Sen "Dinim İslâm" ders kitabının (7. Baskı, s.151-189) İslâm Ahlâkı ünitesini öğreten yardımcı bir eğitim asistanısın. Şu an öğrenciye "${topic.name}" konusunu öğretiyorsun.

Konu özeti: ${topic.desc}

Bu kavram ${isGood ? 'İslâm ahlâkında ÖVÜLEN davranışlar' : 'İslâm ahlâkında YERİLEN davranışlar'} kategorisindedir.

Kurallar:
- Ortaokul/lise düzeyine uygun, samimi ve ilgi çekici dil kullan
- Kur\'an âyetlerine ve hadislere dayandır (kaynak numarası gerekmez, anlam yeterli)
- Kavramı günlük hayatla ilişkilendir
- Cevaplarını kısa tut: 3-5 cümle ideal
- Ara sıra düşündürücü soru sor
- Her zaman Türkçe yanıt ver`;
}

// ═══════════════════════════════════════════
// QUICK REPLIES
// ═══════════════════════════════════════════
const QR_BASE = ['Bu kavramı kısaca tanımla', 'Günlük hayattan örnek ver', 'Kur\'an ne diyor?'];
const QR_EXTRA = {
  dogruluk:   ['Yalancılık neden zararlı?','Doğru insan nasıl tanınır?'],
  infak:      ['İnfak ile zekât aynı mı?','Kim ne kadar infak etmeli?'],
  iffet:      ['Hayâ ile iffet ilişkisi?','Günümüzde iffet nasıl korunur?'],
  emanet:     ['Sadece eşya mı emanet?','İhanette vebâl nedir?'],
  adalet:     ['Adaletsizliğe nasıl tepki?','Devlet adaleti ile kişi adaleti?'],
  kardeslik:  ['Kardeşlik nasıl kurulur?','Dini kardeşlik aile bağından mı güçlü?'],
  sabir:      ['Sabır pasif bekleyiş mi?','Sabır ile teslimiyet aynı mı?'],
  giybet:     ['Düşüncemi söylemek gıybet mi?','Gıybeti duyunca ne yapmalı?'],
  kibir:      ['Özgüven ile kibir farkı?','Kibirden nasıl kurtulunur?'],
  haset:      ['Gıpta ile haset farkı?','Hasetten nasıl kurtulunur?'],
  yalan:      ['Beyaz yalan caiz mi?','Yalancının sonu ne olur?'],
};
function getQR(id) {
  return [...(QR_EXTRA[id] || QR_BASE.slice(0,2)), ...QR_BASE.slice(0)].slice(0,4);
}

// ═══════════════════════════════════════════
// RENDER HOME
// ═══════════════════════════════════════════
function renderHome() {
  const done = Object.values(progress).filter(Boolean).length;
  const pct = Math.round((done / TOTAL) * 100);
  document.getElementById('main-progress').style.width = pct + '%';
  document.getElementById('pct-label').textContent = done + ' / ' + TOTAL + ' konu';

  ['good','bad'].forEach(type => {
    const el = document.getElementById(type + '-list');
    el.innerHTML = '';
    TOPICS[type].forEach(t => {
      const isDone = !!progress[t.id];
      const c = document.createElement('div');
      c.className = 'topic-card ' + type;
      c.innerHTML = `
        <div class="topic-icon">${t.icon}</div>
        <div class="topic-info">
          <div class="topic-name">${t.name}</div>
          <div class="topic-sub">${t.sub}</div>
        </div>
        <div class="topic-check ${isDone?'done':''}">${isDone?'✓':''}</div>`;
      c.onclick = () => openTopic(t);
      el.appendChild(c);
    });
  });
}

// ═══════════════════════════════════════════
// OPEN TOPIC
// ═══════════════════════════════════════════
function openTopic(topic) {
  currentTopic = topic;
  chatHistory = [];
  document.getElementById('chat-title').textContent = topic.icon + ' ' + topic.name;
  document.getElementById('chat-sub').textContent = topic.sub;
  const btn = document.getElementById('done-btn');
  if (progress[topic.id]) { btn.textContent = '✓ Tamamlandı'; btn.classList.add('done'); }
  else { btn.textContent = '✓ Tamamla'; btn.classList.remove('done'); }
  document.getElementById('chat-messages').innerHTML = '';
  showScreen('chat-screen');

  const welcome = `Merhaba! Bugün **${topic.name}** konusunu birlikte keşfedeceğiz.\n\n${topic.desc.substring(0,120)}…\n\nAşağıdaki sorulardan birini seçebilir ya da kendi sorunuzu yazabilirsiniz.`;
  addMsg('bot', welcome);
  renderQR();
  document.getElementById('user-input').addEventListener('input', function(){
    document.getElementById('send-btn').disabled = this.value.trim().length === 0;
  });
}

// ═══════════════════════════════════════════
// MESSAGE DISPLAY
// ═══════════════════════════════════════════
function addMsg(role, text) {
  const wrap = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `
    <div class="msg-avatar">${role==='bot'?'📖':'👤'}</div>
    <div class="msg-bubble">${fmt(text)}</div>`;
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}

function fmt(t) {
  return '<p>' + t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>') + '</p>';
}

function showTyping() {
  const wrap = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className='msg bot'; d.id='typing-ind';
  d.innerHTML='<div class="msg-avatar">📖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}
function rmTyping(){ const e=document.getElementById('typing-ind'); if(e)e.remove(); }

function renderQR() {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  getQR(currentTopic.id).forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr-btn'; b.textContent = q;
    b.onclick = () => { qr.innerHTML=''; sendUserMsg(q); };
    qr.appendChild(b);
  });
}

// ═══════════════════════════════════════════
// SEND MESSAGE — calls /api/chat proxy
// ═══════════════════════════════════════════
async function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text || isLoading) return;
  inp.value = ''; autoResize(inp);
  document.getElementById('quick-replies').innerHTML = '';
  await sendUserMsg(text);
}

async function sendUserMsg(text) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addMsg('user', text);
  chatHistory.push({ role:'user', content:text });
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: buildSystem(currentTopic), messages: chatHistory })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Sunucu hatası: ' + res.status);
    }

    const data = await res.json();
    const reply = data.content?.map(c=>c.text||'').join('') || 'Yanıt alınamadı.';
    rmTyping();
    addMsg('bot', reply);
    chatHistory.push({ role:'assistant', content:reply });

    if (chatHistory.length >= 4) setTimeout(renderQR, 400);

  } catch(e) {
    rmTyping();
    addMsg('bot', `⚠️ Hata: ${e.message}`);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function toggleDone() {
  progress[currentTopic.id] = !progress[currentTopic.id];
  localStorage.setItem('dinim_prog', JSON.stringify(progress));
  const btn = document.getElementById('done-btn');
  if (progress[currentTopic.id]) {
    btn.textContent = '✓ Tamamlandı'; btn.classList.add('done');
    addMsg('bot', `🎉 Tebrikler! **${currentTopic.name}** konusunu tamamladın. Ana menüden ilerlemenizi görebilirsiniz.`);
  } else {
    btn.textContent = '✓ Tamamla'; btn.classList.remove('done');
  }
}
function goHome() { renderHome(); showScreen('home-screen'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading-screen').style.display='none';
    renderHome(); showScreen('home-screen');
  }, 500);
});
</script>
</body>
</html>
