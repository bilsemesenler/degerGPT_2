<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dinim İslâm – Ahlâk</title>
<style>
  :root {
    --green-50: #EAF3DE; --green-100: #C0DD97; --green-200: #97C459;
    --green-600: #3B6D11; --green-800: #27500A; --green-900: #173404;
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
    --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B;
    --amber-800: #633806; --amber-900: #412402;
    --red-50: #FCEBEB; --red-100: #F7C1C1; --red-600: #A32D2D; --red-800: #791F1F;
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-600: #993C1D; --coral-800: #712B13;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
    --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --bg: #FAFAF7;
    --card: #FFFFFF;
    --text: #2C2C2A;
    --muted: #888780;
    --border: rgba(44,44,42,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --card: #252523;
      --text: #e8e6e0;
      --muted: #888780;
      --border: rgba(232,230,224,0.1);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    max-width: 480px; margin: 0 auto; }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  .home-header {
    background: linear-gradient(160deg, var(--teal-600) 0%, var(--green-600) 100%);
    padding: 2.5rem 1.5rem 2rem;
    color: white;
  }
  .home-header .logo { font-size: 13px; letter-spacing: .08em; opacity: .8; margin-bottom: .5rem; }
  .home-header h1 { font-size: 26px; font-weight: 600; line-height: 1.25; }
  .home-header p { font-size: 14px; opacity: .85; margin-top: .5rem; }
  .progress-bar-wrap { margin-top: 1.25rem; }
  .progress-bar-wrap .label { display: flex; justify-content: space-between; font-size: 12px; opacity: .85; margin-bottom: 6px; }
  .progress-track { height: 6px; background: rgba(255,255,255,.25); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: white; border-radius: 99px; transition: width .5s ease; }

  .section-title { font-size: 12px; font-weight: 600; letter-spacing: .08em; color: var(--muted);
    padding: .75rem 1.25rem .4rem; text-transform: uppercase; }

  .topic-list { padding: 0 1rem .5rem; display: flex; flex-direction: column; gap: 6px; }
  .topic-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .9rem 1rem;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: transform .12s, box-shadow .12s;
  }
  .topic-card:active { transform: scale(.98); }
  .topic-icon {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .topic-card.good .topic-icon { background: var(--teal-50); }
  .topic-card.bad  .topic-icon { background: var(--coral-50); }
  .topic-info { flex: 1; min-width: 0; }
  .topic-name { font-size: 15px; font-weight: 500; }
  .topic-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .topic-check {
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 11px; transition: all .2s;
  }
  .topic-check.done { background: var(--teal-200); border-color: var(--teal-200); }

  /* ── CHAT SCREEN ── */
  .chat-nav {
    position: sticky; top: 0; z-index: 10;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: .85rem 1rem;
    display: flex; align-items: center; gap: .75rem;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: var(--bg); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
    color: var(--text);
  }
  .chat-nav-info { flex: 1; min-width: 0; }
  .chat-nav-info h2 { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-nav-info p { font-size: 12px; color: var(--muted); }
  .mark-done-btn {
    padding: 6px 12px; border-radius: 99px; border: 1.5px solid var(--teal-200);
    background: transparent; color: var(--teal-600); font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .mark-done-btn.done { background: var(--teal-200); border-color: var(--teal-200); color: var(--teal-800); }
  @media (prefers-color-scheme: dark) {
    .mark-done-btn { color: var(--teal-100); border-color: var(--teal-600); }
    .mark-done-btn.done { background: var(--teal-600); border-color: var(--teal-600); color: var(--teal-50); }
  }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 1rem;
    display: flex; flex-direction: column; gap: .75rem;
  }
  .msg { display: flex; gap: 8px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .msg.bot .msg-avatar { background: var(--teal-50); color: var(--teal-800); }
  .msg.user .msg-avatar { background: var(--purple-50); color: var(--purple-800); }
  .msg-bubble {
    padding: .7rem .9rem;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    max-width: calc(100% - 46px);
  }
  .msg.bot .msg-bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: var(--teal-600); color: white; border-bottom-right-radius: 4px; }
  .msg-bubble p { margin-bottom: .5rem; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { font-weight: 600; }

  .typing { display: flex; gap: 4px; align-items: center; padding: .4rem .2rem; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    animation: bounce .9s ease infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; padding: .5rem 1rem 0; }
  .qr-btn {
    padding: 7px 13px; border-radius: 99px;
    border: 1px solid var(--border); background: var(--card);
    font-size: 13px; color: var(--text); cursor: pointer;
    transition: all .12s;
  }
  .qr-btn:active { transform: scale(.97); background: var(--bg); }

  .chat-input-area {
    padding: .75rem 1rem; background: var(--card); border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end;
  }
  .chat-textarea {
    flex: 1; border: 1px solid var(--border); border-radius: 18px;
    padding: .6rem .9rem; font-size: 14px; font-family: inherit;
    resize: none; background: var(--bg); color: var(--text);
    max-height: 120px; line-height: 1.5;
    outline: none;
  }
  .chat-textarea:focus { border-color: var(--teal-200); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: var(--teal-600); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px; transition: opacity .15s;
  }
  .send-btn:disabled { opacity: .4; }

  /* ── LOADING ── */
  #loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem; z-index: 100;
  }
  #loading-screen .dots { display: flex; gap: 8px; }
  #loading-screen .dots span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--teal-600);
    animation: bounce .9s ease infinite;
  }
  #loading-screen .dots span:nth-child(2) { animation-delay: .15s; }
  #loading-screen .dots span:nth-child(3) { animation-delay: .3s; }

  .arabic-quote {
    background: var(--green-50); border-left: 3px solid var(--green-600);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: .6rem .8rem; margin: .5rem 0;
    font-style: italic; font-size: 13px; color: var(--green-600);
  }
  @media (prefers-color-scheme: dark) {
    .arabic-quote { background: rgba(59,109,17,.15); color: var(--green-100); }
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div style="font-size:32px">📖</div>
  <p style="font-size:15px;color:var(--muted)">Yükleniyor…</p>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- HOME SCREEN -->
<div class="screen" id="home-screen">
  <div class="home-header">
    <div class="logo">DİNİM İSLÂM • ÜNİTE 4</div>
    <h1>İslâm Ahlâkı</h1>
    <p>Model İnsan Kavramları</p>
    <div class="progress-bar-wrap">
      <div class="label">
        <span>Genel ilerleme</span>
        <span id="pct-label">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="main-progress" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="section-title">✦ İyi Ahlâk (Övülen Davranışlar)</div>
  <div class="topic-list" id="good-list"></div>

  <div class="section-title">✦ Kötü Ahlâk (Yerilen Davranışlar)</div>
  <div class="topic-list" id="bad-list"></div>

  <div style="height:1.5rem"></div>
</div>

<!-- CHAT SCREEN -->
<div class="screen" id="chat-screen">
  <nav class="chat-nav">
    <button class="back-btn" onclick="goHome()" aria-label="Geri">←</button>
    <div class="chat-nav-info">
      <h2 id="chat-title">Konu</h2>
      <p id="chat-sub">Sohbet ile öğren</p>
    </div>
    <button class="mark-done-btn" id="done-btn" onclick="toggleDone()">✓ Tamamla</button>
  </nav>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="chat-input-area">
    <textarea class="chat-textarea" id="user-input" rows="1"
      placeholder="Bir soru sor…"
      oninput="autoResize(this)"
      onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let progress = JSON.parse(localStorage.getItem('dinim_progress') || '{}');
let currentTopic = null;
let chatHistory = [];
let isLoading = false;

// ═══════════════════════════════════════════════════
// SYSTEM PROMPT FACTORY
// ═══════════════════════════════════════════════════
function buildSystemPrompt(topic) {
  const allTopics = [...TOPICS.good, ...TOPICS.bad];
  const isGood = TOPICS.good.find(t => t.id === topic.id);
  return `Sen "Dinim İslâm" ders kitabının (7. Baskı) İslâm Ahlâkı ünitesini öğreten yardımcı bir eğitim asistanısın. Şu an öğrenciye "${topic.name}" konusunu öğretiyorsun.

Konu hakkında temel bilgi:
${topic.desc}

Bu kavram ${isGood ? 'İslâm ahlâkında övülen (iyi) davranışlar kategorisindedir' : 'İslâm ahlâkında yerilen (kötü) davranışlar kategorisindedir'}.

Görevin:
- Konuyu ortaokul/lise düzeyindeki öğrencilere samimi, anlaşılır ve ilgi çekici bir şekilde anlatmak
- Kur'an âyetlerine ve hadislere dayalı örnekler vermek (kaynak belirtmek gerekmez, anlam yeterlidir)
- Öğrencinin sorularını cevaplamak ve kavramı günlük hayatla ilişkilendirmek
- Türkçe konuşmak, resmi ama sıcak bir dil kullanmak
- Cevaplarını kısa ve odaklı tutmak (3-5 cümle ideal, çok uzun yazma)
- Ara sıra öğrenciye düşündürücü soru sormak

Her zaman Türkçe yanıt ver.`;
}

// ═══════════════════════════════════════════════════
// QUICK REPLIES PER TOPIC
// ═══════════════════════════════════════════════════
function getQuickReplies(topicId) {
  const base = [
    'Bu kavramın kısa tanımı nedir?',
    'Günlük hayattan örnek ver',
    'Kur\'an bunu nasıl anlatıyor?',
    'Bu davranışın faydaları neler?'
  ];
  const extras = {
    dogruluk: ['Doğruluk ile dürüstlük arasındaki fark?', 'Doğru insanın özellikleri neler?'],
    infak: ['İnfak ile zekât aynı şey mi?', 'Kim, ne kadar infak etmeli?'],
    iffet: ['Hayâ ile iffet ilişkisi nedir?', 'Günümüzde iffet nasıl korunur?'],
    emanet: ['Emanet sadece eşya mıdır?', 'Emanete ihanet ne anlama gelir?'],
    adalet: ['Adaleti kim sağlayabilir?', 'Adaletsizlikle nasıl mücadele edilir?'],
    kardeslik: ['Müslüman kardeşliği nasıl kurulur?', 'Kardeşliğin sınırları var mı?'],
    sabir: ['Sabır pasif bir bekleyiş midir?', 'Sabır ile teslimiyet aynı mı?'],
    giybet: ['Düşüncemi söylemek gıybet midir?', 'Gıybeti duyunca ne yapmalıyım?'],
    kibir: ['Özgüven ile kibir arasındaki fark?', 'Kibirden nasıl kurtulunur?'],
  };
  return [...(extras[topicId] || base.slice(0,2)), ...base.slice(2)].slice(0, 4);
}

// ═══════════════════════════════════════════════════
// RENDER HOME
// ═══════════════════════════════════════════════════
function renderHome() {
  const total = TOPICS.good.length + TOPICS.bad.length;
  const done = Object.values(progress).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('main-progress').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';

  ['good', 'bad'].forEach(type => {
    const el = document.getElementById(type + '-list');
    el.innerHTML = '';
    TOPICS[type].forEach(topic => {
      const isDone = !!progress[topic.id];
      const card = document.createElement('div');
      card.className = 'topic-card ' + type;
      card.innerHTML = `
        <div class="topic-icon">${topic.icon}</div>
        <div class="topic-info">
          <div class="topic-name">${topic.name}</div>
          <div class="topic-sub">${topic.sub}</div>
        </div>
        <div class="topic-check ${isDone ? 'done' : ''}">${isDone ? '✓' : ''}</div>
      `;
      card.onclick = () => openTopic(topic);
      el.appendChild(card);
    });
  });
}

// ═══════════════════════════════════════════════════
// OPEN TOPIC
// ═══════════════════════════════════════════════════
function openTopic(topic) {
  currentTopic = topic;
  chatHistory = [];

  document.getElementById('chat-title').textContent = topic.icon + ' ' + topic.name;
  document.getElementById('chat-sub').textContent = topic.sub;

  const doneBtn = document.getElementById('done-btn');
  if (progress[topic.id]) {
    doneBtn.textContent = '✓ Tamamlandı';
    doneBtn.classList.add('done');
  } else {
    doneBtn.textContent = '✓ Tamamla';
    doneBtn.classList.remove('done');
  }

  document.getElementById('chat-messages').innerHTML = '';
  showScreen('chat-screen');

  // Welcome message
  const welcome = `Merhaba! 😊 Bugün **${topic.name}** konusunu birlikte keşfedeceğiz.\n\n${topic.desc.slice(0, 120)}…\n\nBu konu hakkında merak ettiğin bir şey var mı? Aşağıdaki sorulardan birini seçebilir ya da kendi sorunuzu yazabilirsiniz.`;
  addMessage('bot', welcome);

  renderQuickReplies();
  enableInput();
}

// ═══════════════════════════════════════════════════
// CHAT FUNCTIONS
// ═══════════════════════════════════════════════════
function addMessage(role, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '📖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">📖</div>
    <div class="msg-bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function renderQuickReplies() {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  getQuickReplies(currentTopic.id).forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = q;
    btn.onclick = () => { qr.innerHTML = ''; sendUserMessage(q); };
    qr.appendChild(btn);
  });
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  autoResize(input);
  document.getElementById('quick-replies').innerHTML = '';
  await sendUserMessage(text);
}

async function sendUserMessage(text) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    if (!API_KEY || API_KEY === 'YOUR_ANTHROPIC_API_KEY') {
      // Demo mode — no API key
      await sleep(800);
      removeTyping();
      const demo = `Bu bir demo yanıttır. Gerçek yanıtlar için **index.html** dosyasındaki \`API_KEY\` değişkenine Anthropic API anahtarınızı girin.\n\n**${currentTopic.name}** hakkında sorduğunuz soru: "${text}"`;
      addMessage('bot', demo);
      chatHistory.push({ role: 'assistant', content: demo });
    } else {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 600,
          system: buildSystemPrompt(currentTopic),
          messages: chatHistory
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || 'API hatası: ' + res.status);
      }

      const data = await res.json();
      const reply = data.content?.map(c => c.text || '').join('') || 'Yanıt alınamadı.';

      removeTyping();
      addMessage('bot', reply);
      chatHistory.push({ role: 'assistant', content: reply });

      // After 2nd exchange, suggest marking done
      if (chatHistory.length >= 4 && !progress[currentTopic.id]) {
        setTimeout(() => {
          const qr = document.getElementById('quick-replies');
          if (!qr.querySelector('.qr-btn')) renderQuickReplies();
        }, 500);
      }
    }
  } catch (e) {
    removeTyping();
    addMessage('bot', `⚠️ Bir hata oluştu: ${e.message}. Lütfen tekrar deneyin.`);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function toggleDone() {
  progress[currentTopic.id] = !progress[currentTopic.id];
  localStorage.setItem('dinim_progress', JSON.stringify(progress));

  const btn = document.getElementById('done-btn');
  if (progress[currentTopic.id]) {
    btn.textContent = '✓ Tamamlandı';
    btn.classList.add('done');
    addMessage('bot', `🎉 Tebrikler! **${currentTopic.name}** konusunu tamamladın. Ana menüden ilerlemenizi görebilirsiniz.`);
  } else {
    btn.textContent = '✓ Tamamla';
    btn.classList.remove('done');
  }
}

function goHome() {
  renderHome();
  showScreen('home-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function enableInput() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  input.addEventListener('input', () => {
    btn.disabled = input.value.trim().length === 0;
  });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading-screen').style.display = 'none';
    renderHome();
    showScreen('home-screen');
  }, 600);
});
</script>
